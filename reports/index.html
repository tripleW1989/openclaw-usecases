<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 场景日报 - 汇总</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .header {
      background: rgba(255,255,255,0.98);
      padding: 50px 40px;
      border-radius: 24px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .header h1 {
      font-size: 42px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
    }
    .header .subtitle {
      font-size: 18px;
      color: #666;
      margin-bottom: 25px;
    }
    .header .meta {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .header .meta-item {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 500;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: rgba(255,255,255,0.95);
      padding: 25px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .stat-value {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }
    .reports-section {
      background: rgba(255,255,255,0.95);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .reports-section h2 {
      font-size: 28px;
      color: #667eea;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .report-list {
      display: grid;
      gap: 15px;
    }
    .report-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 25px;
      background: #fafafa;
      border-radius: 16px;
      border: 2px solid transparent;
      transition: all 0.3s;
      text-decoration: none;
      color: inherit;
    }
    .report-item:hover {
      background: #fff;
      border-color: #667eea;
      transform: translateX(5px);
      box-shadow: 0 5px 20px rgba(102,126,234,0.2);
    }
    .report-item .date {
      font-size: 18px;
      font-weight: 700;
      color: #667eea;
    }
    .report-item .count {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .report-item .arrow {
      font-size: 20px;
      color: #667eea;
      margin-left: 15px;
    }
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-top: 40px;
      padding: 30px;
      font-size: 15px;
    }
    .footer p { margin: 8px 0; }
    .external-links {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
    }
    .external-links a {
      color: #fff;
      text-decoration: none;
      padding: 10px 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      font-size: 14px;
      transition: all 0.2s;
    }
    .external-links a:hover {
      background: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🦞 OpenClaw 场景日报汇总</h1>
      <p class="subtitle">每天自动收集 OpenClaw 实际应用案例和工作流</p>
      <div class="meta">
        <span class="meta-item">📊 共 2 期日报</span>
        <span class="meta-item">📈 累计 27 个场景</span>
        <span class="meta-item">⏰ 更新：2026/3/9 10:08:10</span>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value">2</div>
        <div class="stat-label">发布天数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">27</div>
        <div class="stat-label">场景总数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">12</div>
        <div class="stat-label">最新一期</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">14</div>
        <div class="stat-label">日均场景</div>
      </div>
    </div>

    <div class="reports-section">
      <h2>📅 历史日报</h2>
      <div class="report-list">
        
        <a href="2026-03-09.html" class="report-item">
          <span class="date">2026-03-09 日报</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="count">12 个场景</span>
            <span class="arrow">→</span>
          </div>
        </a>
        
        <a href="2026-03-08.html" class="report-item">
          <span class="date">2026-03-08 日报</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <span class="count">15 个场景</span>
            <span class="arrow">→</span>
          </div>
        </a>
        
      </div>
    </div>

    <div class="footer">
      <p>🤖 Generated by OpenClaw Auto Collector</p>
      <p>📊 数据来源于博查搜索 • 每日 22:00 自动更新</p>
      <div class="external-links">
        <a href="https://github.com/tripleW1989/openclaw-usecases" target="_blank">🐙 GitHub 仓库</a>
        <a href="https://github.com/tripleW1989/openclaw-usecases/actions" target="_blank">⚙️ 构建记录</a>
      </div>
    </div>
  </div>
</body>
</html>
