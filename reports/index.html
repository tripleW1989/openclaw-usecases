<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw 可落地场景汇总</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.6;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    /* Header */
    .header {
      background: rgba(255,255,255,0.98);
      padding: 50px 40px;
      border-radius: 24px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .header h1 {
      font-size: 42px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
    }
    .header .subtitle {
      font-size: 18px;
      color: #666;
      margin-bottom: 25px;
    }
    .header .meta {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .header .meta-item {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 500;
    }
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .nav-links a {
      color: #667eea;
      text-decoration: none;
      padding: 8px 16px;
      border: 2px solid #667eea;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-links a:hover {
      background: #667eea;
      color: #fff;
    }
    
    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .stat-value {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 15px;
      color: #666;
      margin-top: 10px;
    }
    
    /* Search & Filter */
    .filter-bar {
      background: rgba(255,255,255,0.95);
      padding: 20px 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-bar input {
      flex: 1;
      min-width: 250px;
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    .filter-bar input:focus {
      outline: none;
      border-color: #667eea;
    }
    .filter-bar select {
      padding: 12px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 15px;
      background: #fff;
      cursor: pointer;
    }
    .filter-bar select:focus {
      outline: none;
      border-color: #667eea;
    }
    
    /* Category Navigation */
    .category-nav {
      background: rgba(255,255,255,0.95);
      padding: 20px 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .category-nav h2 {
      font-size: 18px;
      color: #667eea;
      margin-bottom: 15px;
    }
    .category-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .category-tag {
      background: #f5f5f5;
      color: #667eea;
      padding: 8px 16px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }
    .category-tag:hover, .category-tag.active {
      background: #667eea;
      color: #fff;
    }
    .category-tag .count {
      margin-left: 6px;
      opacity: 0.7;
      font-size: 12px;
    }
    
    /* Cards Grid */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .scenario-card {
      background: rgba(255,255,255,0.98);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }
    .scenario-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(102,126,234,0.25);
      border-color: #667eea;
    }
    .scenario-card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .scenario-card-icon {
      font-size: 28px;
      flex-shrink: 0;
    }
    .scenario-card-title {
      font-size: 17px;
      font-weight: 600;
      color: #333;
      line-height: 1.4;
      flex: 1;
    }
    .scenario-card-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .scenario-card-tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 500;
    }
    .scenario-card-tag.source {
      background: #f0f0f0;
      color: #666;
    }
    .scenario-card-tag.date {
      background: #e8f4fd;
      color: #0366d6;
    }
    .scenario-card-preview {
      font-size: 14px;
      color: #666;
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      flex: 1;
    }
    .scenario-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
    }
    .scenario-card-hint {
      font-size: 12px;
      color: #999;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .scenario-card-link {
      color: #667eea;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 6px 14px;
      border: 2px solid #667eea;
      border-radius: 16px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .scenario-card-link:hover {
      background: #667eea;
      color: #fff;
    }
    
    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-content {
      background: #fff;
      border-radius: 24px;
      max-width: 800px;
      width: 100%;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
      animation: modalSlideIn 0.3s ease;
    }
    @keyframes modalSlideIn {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .modal-header {
      padding: 30px 30px 20px;
      border-bottom: 1px solid #eee;
      position: sticky;
      top: 0;
      background: #fff;
      border-radius: 24px 24px 0 0;
      z-index: 1;
    }
    .modal-title {
      font-size: 26px;
      color: #333;
      margin-bottom: 15px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .modal-title-icon {
      font-size: 32px;
    }
    .modal-meta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .modal-tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 6px 14px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }
    .modal-tag.source {
      background: #f0f0f0;
      color: #666;
    }
    .modal-tag.date {
      background: #e8f4fd;
      color: #0366d6;
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #f5f5f5;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      color: #666;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover {
      background: #667eea;
      color: #fff;
    }
    .modal-body {
      padding: 30px;
    }
    .modal-summary {
      font-size: 16px;
      line-height: 1.9;
      color: #333;
      background: #fafafa;
      padding: 25px;
      border-radius: 16px;
      border-left: 4px solid #667eea;
      white-space: pre-line;
      margin-bottom: 25px;
    }
    .modal-actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
    }
    .modal-btn {
      padding: 14px 28px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      border: none;
    }
    .modal-btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
    }
    .modal-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(102,126,234,0.4);
    }
    .modal-btn-secondary {
      background: #f5f5f5;
      color: #667eea;
    }
    .modal-btn-secondary:hover {
      background: #667eea;
      color: #fff;
    }
    
    /* Footer */
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-top: 40px;
      padding: 30px;
      font-size: 15px;
    }
    .footer p { margin: 8px 0; }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      display: none;
    }
    .empty-state.active {
      display: block;
    }
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    .empty-state-title {
      font-size: 24px;
      color: #333;
      margin-bottom: 10px;
    }
    .empty-state-desc {
      color: #666;
      font-size: 16px;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .header h1 { font-size: 28px; }
      .cards-grid { grid-template-columns: 1fr; }
      .modal-content { max-height: 95vh; }
      .filter-bar { flex-direction: column; }
      .filter-bar input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="nav-links">
        <a href="archive.html">📚 归档索引</a>
        <a href="https://github.com/tripleW1989/openclaw-usecases" target="_blank">🐙 GitHub</a>
      </div>
      <h1>🦞 OpenClaw 可落地场景汇总</h1>
      <p class="subtitle">每天自动收集 OpenClaw 实际应用案例和工作流，帮你发现 AI 助手的无限可能</p>
      <div class="meta">
        <span class="meta-item">📊 总场景数：<span id="total-count">0</span></span>
        <span class="meta-item">📂 分类数：<span id="category-count">0</span></span>
        <span class="meta-item">⏰ 更新：<span id="update-time">-</span></span>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">总场景数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-categories">0</div>
        <div class="stat-label">场景分类</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-sources">0</div>
        <div class="stat-label">信息来源</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-today">0</div>
        <div class="stat-label">今日更新</div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="🔍 搜索场景、关键词、来源...">
      <select id="category-filter">
        <option value="">📂 全部分类</option>
      </select>
      <select id="sort-filter">
        <option value="date-desc">📅 最新优先</option>
        <option value="date-asc">📅 最早优先</option>
        <option value="category">📁 按分类</option>
      </select>
    </div>

    <!-- Category Navigation -->
    <div class="category-nav">
      <h2>📑 按分类浏览</h2>
      <div class="category-tags" id="category-tags"></div>
    </div>

    <!-- Cards Grid -->
    <div class="cards-grid" id="cards-grid"></div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state">
      <div class="empty-state-icon">🔍</div>
      <div class="empty-state-title">没有找到匹配的场景</div>
      <div class="empty-state-desc">试试其他关键词或清除筛选条件</div>
    </div>

    <!-- Footer -->
    <div class="footer">
      <p>🤖 Generated by OpenClaw Auto Collector</p>
      <p>📊 数据来源于博查搜索 • 每日 22:00 自动更新</p>
      <p>⏰ 最后更新：<span id="footer-update-time">-</span></p>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" id="modal-close">×</button>
      <div class="modal-header">
        <h2 class="modal-title">
          <span class="modal-title-icon" id="modal-icon">📋</span>
          <span id="modal-title-text">场景标题</span>
        </h2>
        <div class="modal-meta" id="modal-meta"></div>
      </div>
      <div class="modal-body">
        <div class="modal-summary" id="modal-summary"></div>
        <div class="modal-actions">
          <a href="#" class="modal-btn modal-btn-primary" id="modal-link" target="_blank">
            🔗 阅读原文
          </a>
          <button class="modal-btn modal-btn-secondary" id="modal-copy">
            📋 复制链接
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Scenario Data (will be populated by generate-report.js)
    const scenarios = [];
    const categories = {};
    const sources = new Set();
    let todayCount = 0;
    const today = new Date().toISOString().split('T')[0];

    // Parse scenarios from HTML
    function parseScenarios() {
      const cards = document.querySelectorAll('.category-section');
      cards.forEach(section => {
        const categoryId = section.id;
        const categoryName = section.querySelector('.category-header h2')?.textContent?.replace(/\d+ 个场景/, '').trim() || '未分类';
        const scenarioCards = section.querySelectorAll('.scenario-card');
        
        if (!categories[categoryName]) {
          categories[categoryName] = 0;
        }
        
        scenarioCards.forEach(card => {
          const icon = card.querySelector('h3 span')?.textContent || '📋';
          const title = card.querySelector('h3')?.textContent?.replace(icon, '').trim() || '未命名';
          const tags = Array.from(card.querySelectorAll('.scenario-card .tag'))
            .map(t => t.textContent.trim());
          const category = tags[0] || categoryName;
          const source = tags[1] || '未知来源';
          const date = tags[2]?.replace('📅 ', '') || '未知日期';
          const summary = card.querySelector('.summary')?.textContent?.trim() || '';
          const url = card.querySelector('.url')?.href || '#';
          
          categories[categoryName]++;
          sources.add(source);
          
          if (date.startsWith(today)) todayCount++;
          
          scenarios.push({
            id: Date.now() + Math.random(),
            icon,
            title,
            category,
            source,
            date,
            summary,
            url,
            categoryId
          });
        });
      });
    }

    // Render category tags
    function renderCategoryTags() {
      const container = document.getElementById('category-tags');
      const filter = document.getElementById('category-filter');
      const categoryList = Object.entries(categories).sort((a, b) => b[1] - a[1]);
      
      categoryList.forEach(([name, count]) => {
        // Tags
        const tag = document.createElement('button');
        tag.className = 'category-tag';
        tag.dataset.category = name;
        tag.innerHTML = `${name} <span class="count">(${count})</span>`;
        tag.onclick = () => {
          document.getElementById('category-filter').value = name;
          renderCards();
          document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
          tag.classList.add('active');
        };
        container.appendChild(tag);
        
        // Filter dropdown
        const option = document.createElement('option');
        option.value = name;
        option.textContent = `${name} (${count})`;
        filter.appendChild(option);
      });
      
      // Update counts
      document.getElementById('total-count').textContent = scenarios.length;
      document.getElementById('category-count').textContent = categoryList.length;
      document.getElementById('stat-total').textContent = scenarios.length;
      document.getElementById('stat-categories').textContent = categoryList.length;
      document.getElementById('stat-sources').textContent = sources.size;
      document.getElementById('stat-today').textContent = todayCount;
    }

    // Render cards
    function renderCards() {
      const grid = document.getElementById('cards-grid');
      const search = document.getElementById('search-input').value.toLowerCase();
      const categoryFilter = document.getElementById('category-filter').value;
      const sortFilter = document.getElementById('sort-filter').value;
      const emptyState = document.getElementById('empty-state');
      
      // Filter
      let filtered = scenarios.filter(s => {
        const matchSearch = !search || 
          s.title.toLowerCase().includes(search) ||
          s.summary.toLowerCase().includes(search) ||
          s.source.toLowerCase().includes(search) ||
          s.category.toLowerCase().includes(search);
        const matchCategory = !categoryFilter || s.category === categoryFilter;
        return matchSearch && matchCategory;
      });
      
      // Sort
      if (sortFilter === 'date-desc') {
        filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
      } else if (sortFilter === 'date-asc') {
        filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
      } else if (sortFilter === 'category') {
        filtered.sort((a, b) => a.category.localeCompare(b.category));
      }
      
      // Render
      grid.innerHTML = '';
      if (filtered.length === 0) {
        emptyState.classList.add('active');
        return;
      }
      emptyState.classList.remove('active');
      
      filtered.forEach(s => {
        const card = document.createElement('div');
        card.className = 'scenario-card';
        card.onclick = (e) => {
          if (!e.target.closest('.scenario-card-link')) {
            openModal(s);
          }
        };
        card.innerHTML = `
          <div class="scenario-card-header">
            <span class="scenario-card-icon">${s.icon}</span>
            <span class="scenario-card-title">${s.title}</span>
          </div>
          <div class="scenario-card-meta">
            <span class="scenario-card-tag">${s.category}</span>
            <span class="scenario-card-tag source">${s.source}</span>
            <span class="scenario-card-tag date">${s.date}</span>
          </div>
          <div class="scenario-card-preview">${s.summary}</div>
          <div class="scenario-card-footer">
            <span class="scenario-card-hint">💡 点击查看详情</span>
            <a href="${s.url}" target="_blank" class="scenario-card-link" onclick="event.stopPropagation()">
              🔗 原文
            </a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // Modal functions
    function openModal(scenario) {
      document.getElementById('modal-icon').textContent = scenario.icon;
      document.getElementById('modal-title-text').textContent = scenario.title;
      document.getElementById('modal-meta').innerHTML = `
        <span class="modal-tag">${scenario.category}</span>
        <span class="modal-tag source">${scenario.source}</span>
        <span class="modal-tag date">${scenario.date}</span>
      `;
      document.getElementById('modal-summary').textContent = scenario.summary;
      document.getElementById('modal-link').href = scenario.url;
      document.getElementById('modal-overlay').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    // Copy link
    document.getElementById('modal-copy')?.addEventListener('click', () => {
      const url = document.getElementById('modal-link').href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById('modal-copy');
        btn.textContent = '✅ 已复制';
        setTimeout(() => btn.textContent = '📋 复制链接', 2000);
      });
    });

    // Close modal handlers
    document.getElementById('modal-close')?.addEventListener('click', closeModal);
    document.getElementById('modal-overlay')?.addEventListener('click', (e) => {
      if (e.target.id === 'modal-overlay') closeModal();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeModal();
    });

    // Search and filter handlers
    document.getElementById('search-input')?.addEventListener('input', renderCards);
    document.getElementById('category-filter')?.addEventListener('change', renderCards);
    document.getElementById('sort-filter')?.addEventListener('change', renderCards);

    // Initialize
    parseScenarios();
    renderCategoryTags();
    renderCards();
    
    // Set update time
    const updateTime = new Date().toLocaleString('zh-CN', { 
      year: 'numeric', 
      month: 'numeric', 
      day: 'numeric', 
      hour: '2-digit', 
      minute: '2-digit' 
    });
    document.getElementById('update-time').textContent = updateTime;
    document.getElementById('footer-update-time').textContent = updateTime;
  </script>
</body>
</html>
