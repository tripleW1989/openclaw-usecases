<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>OpenClaw 场景日报 - 归档</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    .header {
      background: rgba(255,255,255,0.98);
      padding: 40px 30px;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .header h1 {
      font-size: 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .nav-links a {
      color: #667eea;
      text-decoration: none;
      padding: 8px 16px;
      border: 2px solid #667eea;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .nav-links a:hover {
      background: #667eea;
      color: #fff;
    }
    .archive-list {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .archive-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #eee;
      transition: all 0.2s;
    }
    .archive-item:hover { background: #f5f5f5; padding-left: 25px; }
    .archive-item:last-child { border-bottom: none; }
    .archive-item a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
    }
    .archive-item .count {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
    }
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-top: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="nav-links">

      <h1>📚 OpenClaw 场景日报归档</h1>
      <p style="color: #666; margin-top: 10px;">历史日报索引</p>
    </div>
    <div class="archive-list">
      
      <div class="archive-item">
        <a href="2026-03-10.html">2026-03-10 日报</a>
        <span class="count">25 个场景</span>
      </div>
      
      <div class="archive-item">
        <a href="2026-03-09.html">2026-03-09 日报</a>

      </div>

      </div>
      
    </div>
    <div class="footer"><p>🤖 Generated by OpenClaw Auto Collector</p></div>
  </div>
</body>
</html>
