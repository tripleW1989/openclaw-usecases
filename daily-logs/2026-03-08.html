  <style>

    body {

      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 40px 20px;
      line-height: 1.6;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    
    .header {
      background: rgba(255,255,255,0.98);
      padding: 50px 40px;
      border-radius: 24px;
      margin-bottom: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    .header h1 {
      font-size: 42px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
    }
    .header .subtitle {
      font-size: 18px;
      color: #666;
      margin-bottom: 25px;
    }
    .header .meta {
      display: flex;
      justify-content: center;
      gap: 15px;
      flex-wrap: wrap;
    }
    .header .meta-item {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 10px 20px;
      border-radius: 25px;
      font-size: 15px;
      font-weight: 500;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .stat-value {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-label {
      font-size: 15px;
      color: #666;
      margin-top: 10px;
    }
    
    .categories {
      background: rgba(255,255,255,0.95);
      padding: 30px 40px;
      border-radius: 20px;
      margin-bottom: 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .section-title {
      font-size: 28px;
      color: #667eea;
      margin-bottom: 20px;
    }
    .category-tags {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .category-tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
    }
    
    .scenarios {
      background: rgba(255,255,255,0.95);
      padding: 30px 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .scenario-card {
      border: 1px solid #e0e0e0;
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 20px;
      transition: all 0.3s;
    }
    .scenario-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(102,126,234,0.2);
      border-color: #667eea;
    }
    .scenario-card h2 {
      font-size: 22px;
      color: #667eea;
      margin-bottom: 15px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .scenario-card h2 .icon {
      font-size: 28px;
    }
    .scenario-card .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .scenario-card .tag {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      padding: 5px 14px;
      border-radius: 15px;
      font-size: 13px;
      font-weight: 500;
    }
    .scenario-card .tag.source {
      background: #f0f0f0;
      color: #666;
    }
    .scenario-card .summary {
      line-height: 1.9;
      color: #333;
      font-size: 15px;
      background: #fafafa;
      padding: 18px;
      border-radius: 12px;
      border-left: 4px solid #667eea;
    }
    .scenario-card .url {
      display: inline-block;
      margin-top: 18px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      padding: 10px 20px;
      border: 2px solid #667eea;
      border-radius: 25px;
      transition: all 0.2s;
    }
    .scenario-card .url:hover {
      background: #667eea;
      color: #fff;
    }
    
    .footer {
      text-align: center;
      color: rgba(255,255,255,0.9);
      margin-top: 50px;
      padding: 30px;
      font-size: 15px;
    }
    .footer p { margin: 8px 0; }
    
    @media (max-width: 768px) {
      body { padding: 20px 10px; }
      .header { padding: 30px 20px; }
      .header h1 { font-size: 28px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .scenarios, .categories { padding: 20px; }
    }
